<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CowboyDollar</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rye&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75)), url('./cowboy-bg.png');
      background-size: cover;
      background-position: center bottom; /* 👈 AQUI resolve o problema */
      background-attachment: fixed;
      color: #fff;
      text-align: center;
      position: relative;
    }
    header { padding: 60px 20px 30px; }
    h1 {
      font-family: 'Rye', cursive;
      font-size: 4.5rem;
      color: #f5c542;
      margin-bottom: 10px;
      text-shadow: 0 0 15px rgba(245,197,66,0.9);
    }
    .saddle-up {
      background: rgba(0,0,0,0.7);
      border: 3px solid #f5c542;
      border-radius: 15px;
      padding: 30px 25px;
      margin: 30px auto;
      max-width: 95%;
      box-shadow: 0 0 40px rgba(245,197,66,0.6);
    }
    .typewriter-text {
      font-size: 1.35rem;
      color: #ffd700;
      text-shadow: 0 0 12px #ffd700;
      min-height: 120px;
      text-align: left;
      max-width: 800px;
      margin: 0 auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.5;
    }
    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.2em;
      background: #ffd700;
      animation: blink 0.8s step-end infinite;
      vertical-align: middle;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .fomo-badge {
      margin: 20px 0;
      font-size: 1.2rem;
      color: #00ff9f;
      text-shadow: 0 0 10px #00ff9f;
      background: rgba(0,255,159,0.12);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #00ff9f;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
      display: flex;
      gap: 40px;
      align-items: stretch;
    }
    .main-content { flex: 1; min-width: 0; }
    .sidebar { width: 450px; flex-shrink: 0; display: flex; flex-direction: column; gap: 30px; }
    .card {
      background: rgba(0,0,0,0.6);
      border: 1px solid #f5c542;
      border-radius: 15px;
      padding: 25px;
      margin: 0;
      box-shadow: 0 0 30px rgba(245,197,66,0.4);
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .chart-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      border: 2px solid #f5c542;
      box-shadow: 0 0 30px rgba(245,197,66,0.5);
      margin-top: 15px;
    }
    .chart-wrapper iframe,
    .chart-wrapper div {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    h2 { color: #f5c542; text-shadow: 0 0 12px rgba(245,197,66,0.8); margin-bottom: 10px; }
    a { color: #f5c542; text-decoration: none; font-weight: bold; }
    a:hover { text-decoration: underline; }
    .btn {
      display: inline-block;
      margin: 15px 10px;
      padding: 16px 32px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.3s;
    }
    .buy-btn {
      background: #00ff9f;
      color: #000;
      font-size: 1.5rem;
      box-shadow: 0 0 25px rgba(0,255,159,0.8);
      animation: pulse-buy 2s infinite;
    }
    @keyframes pulse-buy {
      0%, 100% { box-shadow: 0 0 25px rgba(0,255,159,0.8); transform: scale(1); }
      50% { box-shadow: 0 0 50px rgba(0,255,159,1); transform: scale(1.06); }
    }
    footer {
      margin-top: 50px;
      padding: 20px;
      font-size: 0.95rem;
      opacity: 0.85;
    }
  </style>
</head>
<body>
