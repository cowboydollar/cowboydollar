<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CowboyDollar ($CWD) | The Next 100x Wild West Memecoin</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rye&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.12), rgba(0,0,0,0.25)), url('./cowboy-bg.png');
      background-size: cover;
      background-attachment: fixed;
      background-position: center center;
      color: #fff;
      text-align: center;
      position: relative;
    }
    header { padding: 80px 20px 40px; }
    h1 {
      font-family: 'Rye', cursive;
      font-size: 5rem;
      color: #f5c542;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(245,197,66,0.95);
    }
    .tagline {
      font-size: 1.6rem;
      color: #ffd700;
      text-shadow: 0 0 15px #ffd700;
      margin-bottom: 30px;
    }
    .hero-buttons { margin: 30px 0; }
    .btn {
      display: inline-block;
      margin: 10px;
      padding: 16px 36px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 1.4rem;
      transition: all 0.3s;
    }
    .buy-btn {
      background: #00ff9f;
      color: #000;
      box-shadow: 0 0 30px rgba(0,255,159,0.9);
    }
    .buy-btn:hover { transform: scale(1.08); box-shadow: 0 0 50px rgba(0,255,159,1); }
    .join-btn {
      background: transparent;
      color: #f5c542;
      border: 2px solid #f5c542;
    }
    .join-btn:hover { background: #f5c542; color: #000; }

    .saddle-up {
      background: rgba(0,0,0,0.20);
      border: 3px solid #f5c542;
      border-radius: 15px;
      padding: 35px 30px;
      margin: 40px auto;
      max-width: 920px;
      box-shadow: 0 0 50px rgba(245,197,66,0.7);
    }
    .typewriter-text {
      font-size: 1.4rem;
      color: #ffd700;
      text-shadow: 0 0 12px #ffd700;
      min-height: 130px;
      text-align: left;
      max-width: 800px;
      margin: 0 auto;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      margin: 40px 0;
    }
    .stat-card {
      background: rgba(0,0,0,0.25);
      border: 1px solid #f5c542;
      border-radius: 12px;
      padding: 18px 28px;
      min-width: 180px;
    }
    .stat-number {
      font-size: 2rem;
      color: #00ff9f;
      font-weight: bold;
    }
    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
      display: flex;
      gap: 40px;
      align-items: stretch;
    }
    .main-content { flex: 1; }
    .sidebar { width: 460px; flex-shrink: 0; display: flex; flex-direction: column; gap: 30px; }
    .card {
      background: rgba(0,0,0,0.26);
      border: 1px solid #f5c542;
      border-radius: 15px;
      padding: 28px;
      box-shadow: 0 0 30px rgba(245,197,66,0.4);
      transition: transform 0.3s;
    }
    .card:hover { transform: translateY(-8px); }
    .chart-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      border: 2px solid #f5c542;
      box-shadow: 0 0 30px rgba(245,197,66,0.5);
      margin-top: 15px;
      height: 460px;
    }
    h2 { color: #f5c542; text-shadow: 0 0 12px rgba(245,197,66,0.8); margin-bottom: 15px; }
    footer {
      margin-top: 80px;
      padding: 30px;
      font-size: 0.95rem;
      opacity: 0.9;
    }
    @media (max-width: 1024px) {
      .container { flex-direction: column; gap: 30px; }
      .sidebar { width: 100%; }
      .chart-wrapper { height: 380px; }
      h1 { font-size: 3.8rem; }
    }
    @media (max-width: 768px) {
      h1 { font-size: 3.2rem; }
      .tagline { font-size: 1.3rem; }
      .chart-wrapper { height: 320px; }
      .btn { font-size: 1.2rem; padding: 14px 28px; }
    }
  </style>
</head>
<body>
