<style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background-color: #0a0a0a;
      color: #fff;
      text-align: center;
      position: relative;
      min-height: 100vh;
    }

    /* Container do fundo com efeito de espelhamento nas laterais */
    .background-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    /* Imagem principal (centralizada, mostrando cowboy e patas) */
    .background-main {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: auto;
      height: 100%;
      min-width: 100%;
      object-fit: contain;
      opacity: 0.95;
    }

    /* Laterais espelhadas (esquerda e direita) */
    .background-side {
      position: absolute;
      top: 0;
      width: 30%;
      height: 100%;
      background-size: auto 100%;
      background-repeat: no-repeat;
      opacity: 0.7;
      filter: blur(4px);
      pointer-events: none;
    }
    .side-left {
      left: 0;
      background-image: url('./cowboy-bg.png');
      background-position: right center;
      transform: scaleX(-1); /* Espelha a imagem */
      mask-image: linear-gradient(to right, rgba(0,0,0,0.8), rgba(0,0,0,0));
      -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0.8), rgba(0,0,0,0));
    }
    .side-right {
      right: 0;
      background-image: url('./cowboy-bg.png');
      background-position: left center;
      mask-image: linear-gradient(to left, rgba(0,0,0,0.8), rgba(0,0,0,0));
      -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,0.8), rgba(0,0,0,0));
    }

    /* Gradiente suave sobre tudo para manter legibilidade */
    .overlay-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(0,0,0,0.22), rgba(0,0,0,0.38));
      z-index: 0;
      pointer-events: none;
    }

    /* Conteúdo principal */
    .content {
      position: relative;
      z-index: 2;
    }

    header { padding: 60px 20px 30px; }
    h1 {
      font-family: 'Rye', cursive;
      font-size: 4.5rem;
      color: #f5c542;
      margin-bottom: 10px;
      text-shadow: 0 0 15px rgba(245,197,66,0.9);
    }
    .saddle-up {
      background: rgba(0,0,0,0.25);
      border: 3px solid #f5c542;
      border-radius: 15px;
      padding: 30px 25px;
      margin: 30px auto;
      max-width: 95%;
      box-shadow: 0 0 40px rgba(245,197,66,0.6);
    }
    .typewriter-text {
      font-size: 1.35rem;
      color: #ffd700;
      text-shadow: 0 0 12px #ffd700;
      min-height: 120px;
      text-align: left;
      max-width: 800px;
      margin: 0 auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.5;
    }
    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.2em;
      background: #ffd700;
      animation: blink 0.8s step-end infinite;
      vertical-align: middle;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .fomo-badge {
      margin: 20px 0;
      font-size: 1.2rem;
      color: #00ff9f;
      text-shadow: 0 0 10px #00ff9f;
      background: rgba(0,255,159,0.12);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #00ff9f;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
      display: flex;
      gap: 40px;
      align-items: stretch;
    }
    .main-content { flex: 1; min-width: 0; }
    .sidebar { width: 450px; flex-shrink: 0; display: flex; flex-direction: column; gap: 30px; }
    .card {
      background: rgba(0,0,0,0.32);
      border: 1px solid #f5c542;
      border-radius: 15px;
      padding: 25px;
      margin: 0;
      box-shadow: 0 0 30px rgba(245,197,66,0.4);
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .chart-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      border: 2px solid #f5c542;
      box-shadow: 0 0 30px rgba(245,197,66,0.5);
      margin-top: 15px;
    }
    .chart-wrapper iframe,
    .chart-wrapper div {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    h2 { color: #f5c542; text-shadow: 0 0 12px rgba(245,197,66,0.8); margin-bottom: 10px; }
    a { color: #f5c542; text-decoration: none; font-weight: bold; }
    a:hover { text-decoration: underline; }
    .btn {
      display: inline-block;
      margin: 15px 10px;
      padding: 16px 32px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.3s;
    }
    .buy-btn {
      background: #00ff9f;
      color: #000;
      font-size: 1.5rem;
      box-shadow: 0 0 25px rgba(0,255,159,0.8);
      animation: pulse-buy 2s infinite;
    }
    @keyframes pulse-buy {
      0%, 100% { box-shadow: 0 0 25px rgba(0,255,159,0.8); transform: scale(1); }
      50% { box-shadow: 0 0 50px rgba(0,255,159,1); transform: scale(1.06); }
    }
    footer {
      margin-top: 50px;
      padding: 20px;
      font-size: 0.95rem;
      opacity: 0.85;
    }

    @media (max-width: 1024px) {
      .container { flex-direction: column; gap: 35px; padding: 15px; }
      .sidebar { width: 100%; }
      .chart-wrapper { height: 420px; }
      h1 { font-size: 3.8rem; }
      .typewriter-text { font-size: 1.25rem; min-height: 160px; line-height: 1.6; }
      .fomo-badge { font-size: 1.1rem; padding: 12px; margin: 15px 0; }
      .btn.buy-btn { font-size: 1.4rem; padding: 14px 28px; width: 80%; margin: 20px auto; display: block; }
      .side-left, .side-right { width: 20%; }
    }
    @media (max-width: 768px) {
      header { padding: 40px 15px 25px; }
      h1 { font-size: 3rem; }
      p, .card p { font-size: 1rem; line-height: 1.6; }
      .chart-wrapper { height: 320px !important; }
      .card { padding: 18px; margin: 12px 0; }
      .saddle-up { padding: 20px 15px; margin: 20px 10px; }
      .typewriter-text { font-size: 1.1rem; min-height: 180px; }
      .fomo-badge { font-size: 1rem; padding: 12px; margin: 15px 10px; }
      .btn { padding: 12px 24px; font-size: 1.1rem; }
      #tsparticles { opacity: 0.5; }
      .side-left, .side-right { width: 15%; }
    }
  </style>
