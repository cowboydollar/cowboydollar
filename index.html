<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CowboyDollar</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rye&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;

  /* MELHOR ENQUADRAMENTO DO FUNDO */
  background: linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.28)), url('./cowboy-bg.png');
  background-size: 115%;
  background-position: center bottom;
  background-attachment: fixed;

  color: #fff;
  text-align: center;
  position: relative;
}

header { padding: 60px 20px 30px; }

h1 {
  font-family: 'Rye', cursive;
  font-size: 4.5rem;
  color: #f5c542;
  margin-bottom: 10px;
  text-shadow: 0 0 15px rgba(245,197,66,0.9);
}

.saddle-up {
  background: rgba(0,0,0,0.18);
  border: 3px solid #f5c542;
  border-radius: 15px;
  padding: 30px 25px;
  margin: 30px auto;
  max-width: 95%;
  box-shadow: 0 0 40px rgba(245,197,66,0.6);
}

.typewriter-text {
  font-size: 1.35rem;
  color: #ffd700;
  text-shadow: 0 0 12px #ffd700;
  min-height: 120px;
  text-align: left;
  max-width: 800px;
  margin: 0 auto;
  white-space: pre-wrap;
  word-wrap: break-word;
  line-height: 1.5;
}

.cursor {
  display: inline-block;
  width: 10px;
  height: 1.2em;
  background: #ffd700;
  animation: blink 0.8s step-end infinite;
  vertical-align: middle;
}

@keyframes blink { 50% { opacity: 0; } }

.fomo-badge {
  margin: 20px 0;
  font-size: 1.2rem;
  color: #00ff9f;
  text-shadow: 0 0 10px #00ff9f;
  background: rgba(0,255,159,0.12);
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #00ff9f;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
  display: flex;
  gap: 40px;
  align-items: stretch;
}

.main-content { flex: 1; min-width: 0; }

.sidebar {
  width: 450px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 30px;
}

/* 🔥 CARDS MODERNOS */
.card {
  background: rgba(20, 20, 20, 0.45);
  border: 1px solid rgba(245,197,66,0.6);
  border-radius: 18px;
  padding: 25px;
  margin: 0;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  flex: 1;
  display: flex;
  flex-direction: column;
  backdrop-filter: blur(6px);
  transition: all 0.3s ease;
  animation: fadeUp 0.6s ease;
}

.card:hover {
  transform: translateY(-6px) scale(1.01);
  background: rgba(30, 30, 30, 0.65);
  box-shadow: 0 20px 60px rgba(245,197,66,0.25);
}

/* animação leve */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.chart-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  border: 2px solid #f5c542;
  box-shadow: 0 0 30px rgba(245,197,66,0.5);
  margin-top: 15px;
}

.chart-wrapper iframe,
.chart-wrapper div {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

h2 {
  color: #f5c542;
  text-shadow: 0 0 12px rgba(245,197,66,0.8);
  margin-bottom: 10px;
}

a {
  color: #f5c542;
  text-decoration: none;
  font-weight: bold;
}

a:hover { text-decoration: underline; }

.btn {
  display: inline-block;
  margin: 15px 10px;
  padding: 16px 32px;
  border-radius: 12px;
  font-weight: bold;
  transition: 0.3s;
}

/* 🔥 BOTÃO PREMIUM */
.buy-btn {
  background: #00ff9f;
  color: #000;
  font-size: 1.5rem;
  box-shadow: 0 0 25px rgba(0,255,159,0.8);
  animation: pulse-buy 2s infinite;
  position: relative;
  overflow: hidden;
}

.buy-btn::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
  transition: 0.5s;
}

.buy-btn:hover::after {
  left: 100%;
}

@keyframes pulse-buy {
  0%, 100% { box-shadow: 0 0 25px rgba(0,255,159,0.8); transform: scale(1); }
  50% { box-shadow: 0 0 50px rgba(0,255,159,1); transform: scale(1.06); }
}

footer {
  margin-top: 50px;
  padding: 20px;
  font-size: 0.95rem;
  opacity: 0.85;
}

/* RESPONSIVIDADE */
@media (max-width: 1024px) {
  .container { flex-direction: column; gap: 35px; padding: 15px; }
  .sidebar { width: 100%; }
  .chart-wrapper { height: 420px; }
  h1 { font-size: 3.8rem; }
}

@media (max-width: 768px) {
  .chart-wrapper { height: 320px !important; }
  body { background-attachment: scroll; }
}
</style>
</head>

<body>

<div id="tsparticles" style="position: fixed; inset: 0; pointer-events: none; z-index: -2;"></div>

<header id="main">
<h1>CowboyDollar</h1>
<p>Ride the trend before it explodes 🚀</p>

<a class="btn buy-btn" href="https://pump.fun/coin/4nRDKDaEcEPinwfk8g1CX9GSsn8BGJVw6R2Ck3Sqpump" target="_blank">
Buy on Pump.fun
</a>

<div class="fomo-badge">
<strong>Low Cap Alert:</strong> Early riders win big! Next 100x potential 🚀<br>
Holders growing fast | Liquidity locked | Join the posse on X & Telegram
</div>
</header>

<!-- resto do HTML permanece exatamente igual -->

</body>
</html>
