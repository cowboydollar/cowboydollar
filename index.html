<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CowboyDollar</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rye&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75)), url('./cowboy-bg.png');
      background-size: cover;
      background-attachment: fixed;
      color: #fff;
      text-align: center;
      position: relative;
    }

    header { padding: 60px 20px 30px; }

    h1 {
      font-family: 'Rye', cursive;
      font-size: 4.5rem;
      color: #f5c542;
      margin-bottom: 10px;
      text-shadow: 0 0 25px rgba(245,197,66,0.9), 0 0 15px rgba(245,197,66,0.6);
      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 25px rgba(245,197,66,0.9), 0 0 15px rgba(245,197,66,0.6); }
      50% { text-shadow: 0 0 35px rgba(245,197,66,1), 0 0 20px rgba(245,197,66,0.8); }
    }

    .saddle-up {
      background: rgba(0,0,0,0.5);
      border: 3px solid #f5c542;
      border-radius: 15px;
      padding: 30px 25px;
      margin: 30px auto;
      max-width: 95%;
      box-shadow: 0 0 40px rgba(245,197,66,0.6);
      backdrop-filter: blur(2px);
    }

    .typewriter-text {
      font-size: 1.35rem;
      color: #ffd700;
      text-shadow: 0 0 12px #ffd700;
      min-height: 120px;
      text-align: left;
      max-width: 800px;
      margin: 0 auto;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.2em;
      background: #ffd700;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .fomo-badge {
      margin: 20px 0;
      font-size: 1.2rem;
      color: #00ff9f;
      text-shadow: 0 0 10px #00ff9f;
      background: rgba(0,255,159,0.12);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #00ff9f;
      max-width: 600px;
      margin: auto;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
      display: flex;
      gap: 40px;
      align-items: stretch;
    }

    .main-content { flex: 1; }
    .sidebar { width: 450px; display: flex; flex-direction: column; gap: 30px; }

    /* 🔥 CARDS MAIS CLAROS (ALTERAÇÃO PRINCIPAL) */
    .card {
      background: rgba(0,0,0,0.35);
      border: 1px solid #f5c542;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 0 30px rgba(245,197,66,0.35);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(4px);
      transition: all 0.3s ease;
    }

    .card:hover {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
    }

    .chart-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      border: 2px solid #f5c542;
      box-shadow: 0 0 30px rgba(245,197,66,0.5);
      margin-top: 15px;
      height: 300px;
    }

    .chart-wrapper iframe,
    .chart-wrapper div {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    h2 { color: #f5c542; }

    .btn {
      margin: 15px 10px;
      padding: 16px 32px;
      border-radius: 12px;
      font-weight: bold;
      display: inline-block;
    }

    .buy-btn {
      background: #00ff9f;
      color: #000;
      font-size: 1.5rem;
      box-shadow: 0 0 35px rgba(0,255,159,1);
      animation: pulse-buy 2s infinite;
    }

    @keyframes pulse-buy {
      50% { transform: scale(1.06); }
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      opacity: 0.85;
    }
  </style>
</head>

<body>

<header>
  <h1>CowboyDollar</h1>
  <p>Ride the trend before it explodes 🚀</p>

  <a class="btn buy-btn" href="https://pump.fun/coin/4nRDKDaEcEPinwfk8g1CX9GSsn8BGJVw6R2Ck3Sqpump" target="_blank">
    Buy on Pump.fun
  </a>

  <div class="fomo-badge">
    Low Cap Alert: Early riders win big 🚀
  </div>
</header>

<div class="container">

  <div class="main-content">
    <div class="card"><h2>🤠 The Story</h2><p>CowboyDollar is a movement.</p></div>
    <div class="card"><h2>📜 About</h2><p>Community-driven memecoin.</p></div>
    <div class="card"><h2>📄 Whitepaper</h2>
      <a class="btn" href="whitepaper.html">Read Whitepaper 🤠</a>
    </div>
  </div>

  <div class="sidebar">
    <div class="card">
      <h2>📊 Chart</h2>
      <div class="chart-wrapper">
        <iframe src="https://www.geckoterminal.com/solana/pools/F4tvJZX1oFEhPSR7eK6u92EEXLN6vWipPY6qzavuF8i5?embed=1"></iframe>
      </div>
    </div>
  </div>

</div>

<footer>
  © 2026 CowboyDollar
</footer>

</body>
</html>
